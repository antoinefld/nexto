name: Validate Welcome Section Feature

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type-check / build feature
        run: npm run build

      - name: Save patch
        run: |
          cat > /tmp/welcome-section.patch << 'PATCH'
          --- a/src/App.jsx
          +++ b/src/App.jsx
          @@ -136,6 +136,22 @@ function App() {
                   </div>
                 </section>
          +      {/* WELCOME */}
          +      <section className="page-section" style={{ background: "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)" }}>
          +        <div className="content">
          +          <div className="emoji">👋</div>
          +          <h1 className="title">Bienvenue sur NexTo</h1>
          +          <p className="subtitle">L'application de rencontres pensée pour vous</p>
          +          <p className="description">
          +            NexTo est une application de rencontres 100% gratuite, conçue pour favoriser des connexions authentiques et sincères.
          +          </p>
          +          <div className="features">
          +            <div className="feature">💬 Discussions vraies</div>
          +            <div className="feature">🔒 Profils vérifiés</div>
          +            <div className="feature">🎯 Matching par valeurs</div>
          +            <div className="feature">🆓 Totalement gratuit</div>
          +          </div>
          +          <div className="scroll-indicator"><div className="scroll-arrow">↓</div></div>
          +        </div>
          +      </section>
          PATCH
          cp /tmp/welcome-section.patch welcome-section.patch

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            welcome-section.patch
  feature-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Detect and install test runner
        run: |
          HAS_TEST_SCRIPT=$(node -e "
            const pkg = require('./package.json');
            const s = pkg.scripts && pkg.scripts.test;
            const placeholder = 'echo \"Error: no test specified\"';
            console.log(s && s !== placeholder ? 'yes' : 'no');
          " 2>/dev/null || echo "no")

          HAS_VITEST_CONFIG=$(ls vitest.config.* 2>/dev/null | wc -l)
          HAS_VITEST_DEP=$(node -e "
            const pkg = require('./package.json');
            const dd = pkg.devDependencies || {};
            const d = pkg.dependencies || {};
            const all = Array.isArray(dd) ? [] : Object.keys(dd);
            const all2 = Array.isArray(d) ? [] : Object.keys(d);
            console.log([...all, ...all2].includes('vitest') ? 'yes' : 'no');
          " 2>/dev/null || echo "no")

          if [ "$HAS_TEST_SCRIPT" = "yes" ]; then
            echo "TEST_CMD=npm test --" >> $GITHUB_ENV
          elif [ "$HAS_VITEST_CONFIG" -gt "0" ] || [ "$HAS_VITEST_DEP" = "yes" ]; then
            echo "TEST_CMD=npx vitest run" >> $GITHUB_ENV
          else
            echo "Installing vitest and testing libraries..."
            npm install --no-save -D vitest @testing-library/react @testing-library/jest-dom jsdom @vitejs/plugin-react

            cat > vitest.config.ts << 'EOF'
          import { defineConfig } from 'vitest/config';
          import react from '@vitejs/plugin-react';

          export default defineConfig({
            plugins: [react()],
            test: {
              environment: 'jsdom',
              globals: true,
              setupFiles: ['@testing-library/jest-dom/vitest'],
            },
          });
          EOF

            echo "TEST_CMD=npx vitest run" >> $GITHUB_ENV
          fi

      - name: Write welcome section tests
        run: |
          mkdir -p src/__tests__
          cat > src/__tests__/WelcomeSection.test.jsx << 'EOF'
          import { describe, it, expect, beforeAll } from 'vitest';
          import { render, screen } from '@testing-library/react';
          import { readFileSync } from 'fs';
          import { resolve } from 'path';

          // Parse App.jsx source to verify the welcome section markup exists
          const appSource = readFileSync(resolve(process.cwd(), 'src/App.jsx'), 'utf-8');

          describe('Welcome section – static source validation', () => {
            it('contains the WELCOME comment marker', () => {
              expect(appSource).toContain('WELCOME');
            });

            it('renders a section with the purple-pink gradient background', () => {
              expect(appSource).toContain('linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)');
            });

            it('contains the Bienvenue sur NexTo heading', () => {
              expect(appSource).toContain('Bienvenue sur NexTo');
            });

            it('contains the app subtitle', () => {
              expect(appSource).toContain("L'application de rencontres pensée pour vous");
            });

            it('contains the description mentioning 100% gratuite', () => {
              expect(appSource).toContain('100% gratuite');
            });

            it('contains the wave emoji for greeting', () => {
              expect(appSource).toContain('👋');
            });

            it('lists all four feature items', () => {
              expect(appSource).toContain('💬 Discussions vraies');
              expect(appSource).toContain('🔒 Profils vérifiés');
              expect(appSource).toContain('🎯 Matching par valeurs');
              expect(appSource).toContain('🆓 Totalement gratuit');
            });

            it('contains a scroll indicator with a down arrow', () => {
              expect(appSource).toContain('scroll-indicator');
              expect(appSource).toContain('scroll-arrow');
              expect(appSource).toContain('↓');
            });

            it('uses page-section className on the welcome section', () => {
              const sectionMatches = appSource.match(/className="page-section"/g) || [];
              expect(sectionMatches.length).toBeGreaterThan(0);
            });

            it('contains the feature className for feature items', () => {
              const featureMatches = appSource.match(/className="feature"/g) || [];
              expect(featureMatches.length).toBeGreaterThanOrEqual(4);
            });
          });

          // Smoke-render test: import App and verify welcome section renders in DOM
          describe('Welcome section – render test', () => {
            it('renders Bienvenue sur NexTo in the document', async () => {
              // Dynamically import App to avoid top-level side-effects issues
              const { default: App } = await import('../App.jsx');
              render(<App />);
              const heading = screen.getByText('Bienvenue sur NexTo');
              expect(heading).toBeDefined();
            });

            it('renders the subtitle text', async () => {
              const { default: App } = await import('../App.jsx');
              render(<App />);
              const subtitle = screen.getByText("L'application de rencontres pensée pour vous");
              expect(subtitle).toBeDefined();
            });

            it('renders all four feature labels', async () => {
              const { default: App } = await import('../App.jsx');
              render(<App />);
              expect(screen.getByText('💬 Discussions vraies')).toBeDefined();
              expect(screen.getByText('🔒 Profils vérifiés')).toBeDefined();
              expect(screen.getByText('🎯 Matching par valeurs')).toBeDefined();
              expect(screen.getByText('🆓 Totalement gratuit')).toBeDefined();
            });
          });
          EOF

      - name: Run feature tests
        continue-on-error: false
        run: $TEST_CMD src/__tests__/WelcomeSection.test.jsx

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: |
            src/__tests__/WelcomeSection.test.jsx
            welcome-section.patch
            test-results/
