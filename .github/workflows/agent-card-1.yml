name: Validate Accessibility Button Feature

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint on changed files
        run: |
          npx eslint src/App.jsx src/App.css --max-warnings=99999 || exit 0

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check and build
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  feature-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create accessibility button test
        run: |
          cat > src/App.test.jsx << 'EOF'
          import { describe, it, expect, vi } from 'vitest'
          import { render, screen, fireEvent } from '@testing-library/react'
          import App from './App'

          describe('Accessibility Button Feature', () => {
            it('renders accessibility button in top-right corner', () => {
              render(<App />)
              const button = screen.getByLabelText('Accessibility information')
              expect(button).toBeInTheDocument()
              expect(button).toHaveClass('accessibility-button')
              expect(button.textContent).toBe('♿')
            })

            it('opens modal when accessibility button is clicked', () => {
              render(<App />)
              const button = screen.getByLabelText('Accessibility information')
              fireEvent.click(button)
              expect(screen.getByText('Why Accessibility Matters')).toBeInTheDocument()
              expect(screen.getByText(/Accessibility is not optional/)).toBeInTheDocument()
            })

            it('closes modal when close button is clicked', () => {
              render(<App />)
              const button = screen.getByLabelText('Accessibility information')
              fireEvent.click(button)
              const closeButton = screen.getByText('×')
              fireEvent.click(closeButton)
              expect(screen.queryByText('Why Accessibility Matters')).not.toBeInTheDocument()
            })

            it('closes modal when overlay is clicked', () => {
              render(<App />)
              const button = screen.getByLabelText('Accessibility information')
              fireEvent.click(button)
              const overlay = document.querySelector('.accessibility-modal-overlay')
              fireEvent.click(overlay)
              expect(screen.queryByText('Why Accessibility Matters')).not.toBeInTheDocument()
            })

            it('does not close modal when modal content is clicked', () => {
              render(<App />)
              const button = screen.getByLabelText('Accessibility information')
              fireEvent.click(button)
              const modal = document.querySelector('.accessibility-modal')
              fireEvent.click(modal)
              expect(screen.getByText('Why Accessibility Matters')).toBeInTheDocument()
            })
          })
          EOF
      
      - name: Run feature tests
        run: npm test -- src/App.test.jsx --run
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
      
      - name: Upload diff patch
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-diff
          path: .git/