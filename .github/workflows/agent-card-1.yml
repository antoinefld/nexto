name: Test Footer Changes

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint --if-present
      
      - name: Build application
        run: npm run build
      
      - name: Run tests
        run: npm test --if-present -- --passWithNoTests
      
      - name: Validate CSS syntax
        run: |
          if command -v npx &> /dev/null; then
            npx stylelint "src/**/*.css" --allow-empty-input || true
          fi